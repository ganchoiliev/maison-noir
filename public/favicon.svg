<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#8A6A3B"/>
      <stop offset="100%" stop-color="#6B5230"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>
  <!-- Outer border -->
  <rect x="24" y="24" width="464" height="464" rx="72" fill="none" stroke="#8A6A3B" stroke-width="2" opacity="0.3"/>
  <!-- M letter -->
  <text x="256" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="320" font-weight="400" fill="url(#gold)" letter-spacing="-10">M</text>
  <!-- Decorative dot -->
  <circle cx="256" cy="410" r="8" fill="#B8442C"/>
  <!-- Top brass line -->
  <line x1="160" y1="80" x2="352" y2="80" stroke="#8A6A3B" stroke-width="2" opacity="0.5"/>
  <!-- Bottom brass line -->
  <line x1="180" y1="440" x2="332" y2="440" stroke="#8A6A3B" stroke-width="2" opacity="0.4"/>
</svg>
